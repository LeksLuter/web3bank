<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quest Room - Web3 Bank</title>
  <link rel="icon" href="favicon.ico" type="image/x-icon">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Меню сайта -->
  <nav class="navbar" id="navbar">
    <ul class="nav-links">
      <li><a href="index.html" id="nav-home">Home</a></li>
      <li><a href="index.html#why-section" id="nav-why">Why Us</a></li>
      <li><a href="quest-room.html">Quest Room</a></li>
    </ul>
  </nav>

  <header>
    <div class="language-switcher">
      <img src="img/usa-flag.svg" alt="English Flag" class="flag-icon" id="language-flag" onclick="toggleLanguage()">
    </div>
    <h1 id="header-title">Quest Room</h1>
  </header>

  <div class="container">
    <!-- Блок авторизации -->
    <div class="auth-card">
      <button onclick="showLoginForm()" class="cta-button" id="quest-authorize-btn">Authorize with Wallet</button>
      <div id="login-modal" class="modal hidden">
        <h3 id="quest-login-title">Login</h3>
        <input type="text" id="wallet-address" placeholder="Your Wallet Address">
        <button onclick="login()" class="cta-button" id="quest-signin-btn">Sign In</button>
      </div>
    </div>

    <!-- Информация о пользователе -->
    <div class="user-card hidden">
      <h2 id="quest-profile-title">User Profile</h2>
      <p><span id="quest-connected-wallet">Connected Wallet</span>: <span id="user-wallet"></span></p>
      <p><span id="quest-completed-tasks">Completed Tasks</span>: <span id="tasks-completed">0</span></p>
    </div>

    <!-- Список заданий -->
    <div class="quests-container">
      <h2 id="quest-available-title">Available Quests</h2>
      <div id="quests-list">
        <!-- Задания будут добавляться через скрипт -->
      </div>
    </div>
  </div>

  <script src="scripts.js"></script>
</body>
</html>
